    <style>
        /* Efeito Zebrado e Transições */
        tbody tr:nth-child(even) { background-color: #f8fafc; }
        tbody tr:nth-child(odd) { background-color: #ffffff; }
        
        /* Classe para o efeito de arrastar arquivo sobre a página */

            background-color: #cbd5e1 !important; /* Slate 300 */
            outline: 4px dashed #64748b;
            outline-offset: -10px;
        }

<body id="dropZone" class="bg-slate-200 min-h-screen p-4 md:p-8 text-slate-800 font-sans transition-colors duration-200 flex flex-col">
    
    <div class="max-w-5xl mx-auto flex-grow w-full">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold text-slate-700">Visualizador de Extrato OFX</h1>
            <p class="text-slate-500 mt-2">Arraste seu arquivo em qualquer lugar desta página</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-300 mb-8">
            <label class="block mb-3 text-sm font-bold text-slate-600 uppercase tracking-tight">Carregar Arquivo</label>
            <input type="file" id="ofxInput" accept=".ofx" class="block w-full text-sm text-slate-500
                file:mr-4 file:py-2.5 file:px-6
                file:rounded-lg file:border-0
                file:text-sm file:font-bold
                file:bg-slate-700 file:text-white
                hover:file:bg-slate-800 cursor-pointer"/>
        </div>

        <div id="resultArea" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                    <p class="text-xs text-blue-600 uppercase font-black mb-1">Instituição</p>
                    <p id="infoBank" class="text-lg font-bold text-blue-900 truncate">-</p>
                </div>
                <div class="bg-emerald-100 p-6 rounded-2xl shadow-sm border border-emerald-200">

                    <p id="infoBranch" class="text-lg font-bold text-emerald-900">-</p>
                </div>
                <div class="bg-purple-100 p-6 rounded-2xl shadow-sm border border-purple-200">
                    <p class="text-xs text-purple-600 uppercase font-black mb-1">Conta Corrente</p>
                    <p id="infoAccount" class="text-lg font-bold text-purple-900">-</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md border border-slate-300 overflow-hidden mb-12">
                <div class="overflow-x-auto">
                    <table class="min-w-full">
                        <thead>
                            <tr class="bg-slate-700 text-white">
                                <th class="px-6 py-4 text-left text-xs font-bold uppercase tracking-widest">Data</th>
                                <th class="px-6 py-4 text-left text-xs font-bold uppercase tracking-widest">Descrição</th>
                                <th class="px-6 py-4 text-right text-xs font-bold uppercase tracking-widest">Valor (R$)</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('ofxInput');

        // Lógica de Seleção via Input
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        // Lógica de Arrastar e Soltar (Drag and Drop) em toda a página
        ['dragenter', 'dragover'].forEach(eventName => {
            window.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            window.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
            }, false);
        });

        window.addEventListener('drop', (e) => {
            const file = e.dataTransfer.files[0];
            if (file && file.name.toLowerCase().endsWith('.ofx')) {
                handleFile(file);
            } else {
                alert("Por favor, arraste apenas arquivos .ofx");
            }
        });

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.readAsText(file, "ISO-8859-1");
            reader.onload = (e) => parseOFX(e.target.result);
        }

        function parseOFX(data) {
            const bankCode = (getTagValue(data, 'BANKID') || "").padStart(3, '0');
            const bankName = listaBancos[bankCode] || "Banco não identificado";
            
            document.getElementById('infoBank').innerText = `${bankCode} - ${bankName}`;
            document.getElementById('infoBranch').innerText = getTagValue(data, 'BRANCHID') || 'N/A';
            document.getElementById('infoAccount').innerText = getTagValue(data, 'ACCTID') || 'N/A';

            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            const transactionRegex = /<STMTTRN>([\s\S]*?)<\/STMTTRN>/g;
            let match;
            let count = 0;

            while ((match = transactionRegex.exec(data)) !== null) {
                count++;
                const block = match[1];
                const rawDate = getTagValue(block, 'DTPOSTED');
                const memo = getTagValue(block, 'MEMO') || getTagValue(block, 'NAME');
                const amount = getTagValue(block, 'TRNAMT');

                const row = document.createElement('tr');
                const dateFormatted = rawDate ? `${rawDate.substring(6,8)}/${rawDate.substring(4,6)}/${rawDate.substring(0,4)}` : '--/--/----';
                const isNegative = amount.includes('-');
                
                row.className = "border-b border-slate-200 last:border-0 hover:bg-slate-100 transition-colors";
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 font-medium">${dateFormatted}</td>
                    <td class="px-6 py-4 text-sm text-slate-700 font-semibold">${memo}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-right font-bold ${isNegative ? 'text-red-600' : 'text-emerald-700'}">
                        ${parseFloat(amount).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
                    </td>
                `;
                tableBody.appendChild(row);
            }

            if(count > 0) {
                document.getElementById('resultArea').classList.remove('hidden');
                window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 20, behavior: 'smooth' });
            }
        }

        function getTagValue(content, tag) {
            const regex = new RegExp(`<${tag}>([^<\\n\\r]+)`, 'i');
            const match = content.match(regex);
            return match ? match[1].trim() : '';
        }
